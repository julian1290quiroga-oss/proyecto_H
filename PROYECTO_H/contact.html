<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReineErde</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <h1>Wir sind für Sie da</h1>

    <p>
        Sie haben eine Frage zum nachhaltigen Leben oder zu Ihrer Bestellung?
    </p>

    <p>
        Schreiben Sie uns und unser umweltfreundliches Team wird sich mit Ihnen in Verbindung setzen.
    </p>

    <section class="contacto">

        
        <form class="formulario-contacto">

            <label>Nombre</label>
            <input type="text" placeholder="">

            <label>Email</label>
            <input type="email" placeholder="">

            <label>Mensaje</label>
            <textarea placeholder="¿Cómo podemos ayudarte?"></textarea>
          <br>
            <button type="submit">Enviar mensaje</button>

        </form>

    </section>

</body>
</html>
